<body>
    <header class="header">
        <h1>🔍 站长工具 · 网站分析</h1>
    </header>

    <main class="container">
        <!-- 搜索框 -->
        <section class="search-box" aria-label="网站分析">
            <h2 class="sr-only">输入网址进行分析</h2>
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="输入网址，如 baidu.com" autocomplete="off">
                <button id="analyzeBtn" onclick="analyze()">分析</button>
            </div>
            <div class="quick-links">
                <span class="quick-link" onclick="quickAnalyze('baidu.com')">百度</span>
                <span class="quick-link" onclick="quickAnalyze('zhihu.com')">知乎</span>
                <span class="quick-link" onclick="quickAnalyze('bilibili.com')">B站</span>
                <span class="quick-link" onclick="quickAnalyze('juejin.cn')">掘金</span>
                <span class="quick-link" onclick="quickAnalyze('github.com')">GitHub</span>
            </div>
            <div id="dnsResult" style="display:none;margin-top:10px;padding:12px;background:rgba(0,210,255,0.1);border-radius:8px;font-size:12px;line-height:1.8;"></div>
        </section>

        <!-- 错误提示 -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- 加载动画 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loadingText">正在分析网站，请稍候...</p>
            <div id="countdownTimer" style="margin-top:10px;font-size:14px;color:#00d2ff;">
                预计响应时间：<span id="countdown">15</span> 秒
            </div>
        </div>

        <!-- 结果区域 -->
        <section class="result" id="result" aria-label="分析结果"></section>
    </main>

    <footer class="footer">
        站长工具 H5 版 · &copy; <a href="https://gitee.com/BayiHY/site-analyzer" target="_blank" style="color: inherit;">巴依浩爷(BayiHY)</a> · Powered by Python
    </footer>

    <script>
        const urlInput = document.getElementById('urlInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const errorMsg = document.getElementById('errorMsg');

        // 回车触发分析
        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') analyze();
        });

        // 快捷分析
        let dnsTimer = null;  // 提升到函数外部，便于清除
        async function quickAnalyze(url) {
            urlInput.value = url;
            
            // 获取DNS结果框
            const dnsResult = document.getElementById('dnsResult');
            
            // 清除之前的DNS计时器
            if (dnsTimer) {
                clearInterval(dnsTimer);
                dnsTimer = null;
            }
            
            // 如果不是GitHub，隐藏DNS结果框
            if (!url.includes('github')) {
                dnsResult.style.display = 'none';
            }
            
            // 如果是GitHub，先检测DNS
            if (url.includes('github')) {
                dnsResult.style.display = 'block';
                dnsResult.style.color = '#00d2ff';
                
                // DNS解析计时动画
                let dnsSeconds = 0;
                dnsTimer = setInterval(() => {
                    dnsSeconds++;
                    dnsResult.innerHTML = `🔍 正在检测服务器能否访问GitHub... <span style="color:#ff9800;">${dnsSeconds}s</span>`;
                }, 1000);
                dnsResult.innerHTML = '🔍 正在检测服务器能否访问GitHub...';
                
                try {
                    // 直接测试服务器能否访问GitHub
                    const testResp = await fetch('api/test-ip', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ip: '140.82.121.4', host: 'github.com'})
                    });
                    const testData = await testResp.json();
                    
                    // 清除计时器并显示结果
                    clearInterval(dnsTimer);
                    
                    let html = '<div style="font-weight:600;margin-bottom:8px;">📡 GitHub 访问检测</div>';
                    
                    if (testData.accessible) {
                        html += `<div style="color:#00e676;">✅ 服务器可以访问 GitHub</div>`;
                        html += `<div style="color:#4fc3f7;font-size:11px;margin-top:4px;">IP: 140.82.121.4 | 响应: ${testData.response_time}秒</div>`;
                        html += `<div style="margin-top:8px;font-size:11px;color:#888;">⏱️ 检测耗时: ${dnsSeconds}秒</div>`;
                    } else {
                        html += `<div style="color:#ff5252;">❌ 服务器无法访问 GitHub</div>`;
                        html += `<div style="color:#888;font-size:11px;margin-top:4px;">建议配置 hosts 或使用代理</div>`;
                        html += `<div style="margin-top:8px;font-size:11px;color:#888;">⏱️ 检测耗时: ${dnsSeconds}秒</div>`;
                    }
                    
                    dnsResult.innerHTML = html;
                    
                } catch (e) {
                    clearInterval(dnsTimer);
                    dnsResult.innerHTML = '⚠️ 检测失败: ' + e.message + ` (${dnsSeconds}秒)`;
                    dnsResult.style.color = '#ff9800';
                }
            }
            
            // 等DNS检测完成后再开始网站分析
            analyze();
        }

        // 分析网站
        let countdownInterval = null;
        async function analyze() {
            const url = urlInput.value.trim();
            if (!url) {
                showError('请输入网址');
                return;
            }

            // UI 状态
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = '分析中...';
            loading.classList.add('active');
            result.classList.remove('active');
            errorMsg.classList.remove('active');
            
            // 开始倒计时
            let seconds = 15;
            document.getElementById('countdown').textContent = seconds;
            countdownInterval = setInterval(() => {
                seconds--;
                document.getElementById('countdown').textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('loadingText').textContent = '正在努力连接...';
                }
            }, 1000);

            try {
                const resp = await fetch('api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await resp.json();

                if (resp.status === 429) {
                    showRateLimit(data.retry_after || 60);
                } else if (data.error) {
                    showError(data.error);
                } else {
                    renderResult(data);
                }
            } catch (e) {
                showError('网络错误，请重试');
            } finally {
                clearInterval(countdownInterval);
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = '分析';
                loading.classList.remove('active');
                document.getElementById('loadingText').textContent = '正在分析网站，请稍候...';
            }
        }

        // 显示错误
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('active');
        }

        // 限流倒计时
        function showRateLimit(seconds) {
            analyzeBtn.disabled = true;
            let remaining = seconds;
            errorMsg.innerHTML = '⏳ 请求太频繁，<span id="countdown">' + remaining + '</span> 秒后可重试';
            errorMsg.classList.add('active');
            const timer = setInterval(() => {
                remaining--;
                const el = document.getElementById('countdown');
                if (el) el.textContent = remaining;
                if (remaining <= 0) {
                    clearInterval(timer);
                    errorMsg.classList.remove('active');
                    analyzeBtn.disabled = false;
                }
            }, 1000);
        }

        // 渲染结果
        function renderResult(data) {
            const score = data.score || 0;
            const scoreColor = score >= 80 ? '#2ed573' : score >= 60 ? '#ffa502' : '#ff4757';
            const scoreText = score >= 80 ? '优秀' : score >= 60 ? '良好' : '需优化';
            const seo = data.seo || {};
            const ssl = data.ssl || {};
            const perf = data.performance || {};

            let html = `
                <div class="fade-in">
                    <!-- 评分卡片 -->
                    <div class="score-card">
                        <div class="score-value" style="color: ${scoreColor}">${score}</div>
                        <div class="score-label">${scoreText} · 总分 100</div>
                        <div class="score-url">${escHtml(data.url)}</div>
                        <div class="score-bar">
                            <div class="score-bar-fill" style="width: ${score}%; background: ${scoreColor};"></div>
                        </div>
                    </div>

                    <!-- 可用性 -->
                    <div class="info-card">
                        <h3><span class="icon" style="background:rgba(46,213,115,0.15)">🌐</span> 可用性</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="label">状态码</div>
                                <div class="value">${data.accessible ? '<span class="tag tag-success">' + data.status_code + '</span>' : '<span class="tag tag-error">不可访问</span>'}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">响应时间</div>
                                <div class="value">${data.response_time || '-'}s</div>
                            </div>
                            <div class="info-item">
                                <div class="label">服务器</div>
                                <div class="value">${escHtml(data.server || '未知')}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">页面大小</div>
                                <div class="value">${perf.content_size_kb ? perf.content_size_kb + ' KB' : '-'}</div>
                            </div>
                        </div>
                    </div>

                    <!-- SSL 证书 -->
                    <div class="info-card">
                        <h3><span class="icon" style="background:rgba(0,210,255,0.15)">🔒</span> SSL 证书</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="label">状态</div>
                                <div class="value">${ssl.valid ? '<span class="tag tag-success">' + (ssl.status || '有效') + '</span>' : '<span class="tag tag-error">' + (ssl.reason || '无效') + '</span>'}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">颁发机构</div>
                                <div class="value">${escHtml(ssl.issuer || '-')}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">有效期至</div>
                                <div class="value">${ssl.not_after || '-'}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">剩余天数</div>
                                <div class="value">${ssl.days_remaining != null ? ssl.days_remaining + ' 天' : '-'}</div>
                            </div>
                        </div>
                    </div>

                    <!-- SEO 信息 -->
                    <div class="info-card">
                        <h3><span class="icon" style="background:rgba(123,104,238,0.15)">📈</span> SEO 信息</h3>
                        <div class="seo-detail">
                            <div class="seo-label">页面标题</div>
                            <div class="seo-value">${escHtml(seo.title || '未设置')} ${seo.title_length ? '<span class="tag ' + (seo.title_length > 60 ? 'tag-warning' : 'tag-success') + '">' + seo.title_length + '字</span>' : ''}</div>
                        </div>
                        <div class="seo-detail">
                            <div class="seo-label">Meta 描述</div>
                            <div class="seo-value">${escHtml((seo.description || '未设置').substring(0, 120))}${seo.description && seo.description.length > 120 ? '...' : ''} ${seo.description_length ? '<span class="tag ' + (seo.description_length > 160 ? 'tag-warning' : 'tag-success') + '">' + seo.description_length + '字</span>' : ''}</div>
                        </div>
                        <div class="seo-detail">
                            <div class="seo-label">关键词</div>
                            <div class="seo-value">${escHtml(seo.keywords || '未设置')}</div>
                        </div>
                        <div style="margin-top: 12px;">
                            <div class="seo-label" style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:8px;">H 标签统计</div>
                            <div class="h-tags">
                                ${[1,2,3,4,5,6].map(i => seo['h'+i+'_count'] ? '<span class="h-tag">H' + i + ': ' + seo['h'+i+'_count'] + '</span>' : '').join('')}
                            </div>
                        </div>
                        <div class="info-grid" style="margin-top: 12px;">
                            <div class="info-item">
                                <div class="label">图片总数</div>
                                <div class="value">${seo.total_images || 0}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">缺少 alt</div>
                                <div class="value">${seo.images_without_alt || 0}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">内部链接</div>
                                <div class="value">${seo.internal_links || 0}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">外部链接</div>
                                <div class="value">${seo.external_links || 0}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">移动端适配</div>
                                <div class="value">${seo.mobile_friendly ? '<span class="tag tag-success">是 (' + (seo.mobile_type ? seo.mobile_type.join('+') : '') + ')</span>' : '<span class="tag tag-error">否</span>'}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Robots</div>
                                <div class="value">${escHtml(seo.robots || '-')}</div>
                            </div>
                        </div>
                    </div>

                    <!-- AI信任度指标 -->
                    ${seo.ai_trust ? `
                    <div class="info-card" style="border-left: 3px solid #00d2ff;">
                        <h3><span class="icon" style="background:rgba(0,210,255,0.15)">🤖</span> AI信任度 <span style="font-size:14px;color:${seo.ai_trust.score >= 70 ? '#00e676' : seo.ai_trust.score >= 40 ? '#ff9800' : '#ff5252'};margin-left:10px;">${seo.ai_trust.score}/${seo.ai_trust.max_score}分</span></h3>
                        <p style="font-size:12px;color:#888;margin-bottom:15px;">影响AI搜索引擎（如ChatGPT、Perplexity、Google SGE）对网站内容的引用倾向</p>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="label">JSON-LD结构化数据</div>
                                <div class="value">${seo.ai_trust.json_ld.exists ? '<span class="tag tag-success">✓ ' + seo.ai_trust.json_ld.count + '个 (' + (seo.ai_trust.json_ld.types.join(', ') || '未知类型') + ')</span>' : '<span class="tag tag-error">✗ 未设置</span>'}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Open Graph标签</div>
                                <div class="value">${seo.ai_trust.open_graph.complete ? '<span class="tag tag-success">✓ 完整</span>' : '<span class="tag tag-warning">缺少: ' + seo.ai_trust.open_graph.missing.join(', ') + '</span>'}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Canonical标签</div>
                                <div class="value">${seo.ai_trust.canonical.exists ? '<span class="tag tag-success">✓ 已设置</span>' : '<span class="tag tag-warning">未设置</span>'}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">作者/发布者信息</div>
                                <div class="value">${seo.ai_trust.authorship.has_author ? '<span class="tag tag-success">✓ 有作者</span>' : '<span class="tag tag-warning">无作者</span>'} ${seo.ai_trust.authorship.has_publisher ? '<span class="tag tag-success">有发布者</span>' : ''}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">发布日期</div>
                                <div class="value">${seo.ai_trust.dates.has_published ? '<span class="tag tag-success">✓ ' + (seo.ai_trust.dates.published || '已设置') + '</span>' : '<span class="tag tag-warning">未设置</span>'}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">语义化HTML</div>
                                <div class="value">${seo.ai_trust.semantic_html.count >= 3 ? '<span class="tag tag-success">✓ ' + seo.ai_trust.semantic_html.count + '种</span>' : '<span class="tag tag-warning">仅' + seo.ai_trust.semantic_html.count + '种</span>'} <span style="font-size:11px;color:#666;">(${seo.ai_trust.semantic_html.tags_found.join(', ') || '无'})</span></div>
                            </div>
                            <div class="info-item">
                                <div class="label">H标签层级</div>
                                <div class="value">${seo.ai_trust.heading_structure.proper_hierarchy ? '<span class="tag tag-success">✓ 结构清晰</span>' : '<span class="tag tag-warning">层级不完整</span>'}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">图片alt属性</div>
                                <div class="value">${seo.ai_trust.image_alt.total_images === 0 ? '<span class="tag tag-info">无图片</span>' : (seo.ai_trust.image_alt.with_alt / seo.ai_trust.image_alt.total_images > 0.8 ? '<span class="tag tag-success">✓ ' + seo.ai_trust.image_alt.completeness + '</span>' : '<span class="tag tag-warning">' + seo.ai_trust.image_alt.completeness + '</span>')}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">页面语言声明</div>
                                <div class="value">${seo.ai_trust.language.declared ? '<span class="tag tag-success">✓ ' + seo.ai_trust.language.value + '</span>' : '<span class="tag tag-warning">未声明</span>'}</div>
                            </div>
                        </div>
                        <div style="margin-top:15px;padding:12px;background:rgba(0,210,255,0.05);border-radius:8px;">
                            <p style="font-size:12px;color:#aaa;margin-bottom:8px;">💡 <strong>重要性说明：</strong></p>
                            <ul style="font-size:11px;color:#888;list-style:none;padding:0;">
                                <li style="margin-bottom:4px;">• <strong>JSON-LD</strong> - AI搜索引擎优先解析，直接用于生成摘要和知识图谱</li>
                                <li style="margin-bottom:4px;">• <strong>Open Graph</strong> - 社交媒体和AI引用时会优先使用</li>
                                <li style="margin-bottom:4px;">• <strong>语义化HTML</strong> - 帮助AI理解页面结构和内容层次</li>
                                <li style="margin-bottom:4px;">• <strong>发布日期</strong> - AI优先引用有明确时间的内容，过时内容会被降权</li>
                            </ul>
                        </div>
                    </div>
                    ` : ''}

                    <!-- 性能 -->
                    <div class="info-card">
                        <h3><span class="icon" style="background:rgba(255,165,2,0.15)">⚡</span> 性能</h3>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="label">Gzip 压缩</div>
                                <div class="value">${perf.compressed ? '<span class="tag tag-success">已启用</span>' : '<span class="tag tag-warning">未启用</span>'}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">缓存控制</div>
                                <div class="value">${escHtml(perf.cache_control || '-')}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">Keep-Alive</div>
                                <div class="value">${perf.keep_alive ? '<span class="tag tag-success">是</span>' : '<span class="tag tag-warning">否</span>'}</div>
                            </div>
                            <div class="info-item">
                                <div class="label">ETag</div>
                                <div class="value">${escHtml(perf.etag || '-')}</div>
                            </div>
                        </div>
                    </div>`;

            // 问题
            if (data.issues && data.issues.length > 0) {
                html += `
                    <div class="info-card">
                        <h3><span class="icon" style="background:rgba(255,71,87,0.15)">⚠️</span> 发现的问题</h3>
                        <ul class="issue-list">
                            ${data.issues.map(i => '<li><div class="issue-text">' + escHtml(i.text) + '</div><div class="issue-impact">' + escHtml(i.impact) + '</div></li>').join('')}
                        </ul>
                    </div>`;
            }

            // 建议
            if (data.suggestions && data.suggestions.length > 0) {
                html += `
                    <div class="info-card">
                        <h3><span class="icon" style="background:rgba(0,210,255,0.15)">💡</span> 优化建议</h3>
                        <ul class="suggestion-list">
                            ${data.suggestions.map(s => '<li><div class="suggestion-text">' + escHtml(s.text) + '</div><div class="suggestion-effect">' + escHtml(s.effect) + '</div></li>').join('')}
                        </ul>
                    </div>`;
            }

            html += '</div>';

            result.innerHTML = html;
            result.classList.add('active');

            // 触发动画
            setTimeout(() => {
                const bar = result.querySelector('.score-bar-fill');
                if (bar) bar.style.width = score + '%';
            }, 100);
        }

        function escHtml(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    </script>
</body>
</html>
