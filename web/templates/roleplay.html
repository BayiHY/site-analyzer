<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>角色扮演 - 站长工具</title>
    <meta name="description" content="沉浸式角色扮演体验，AI驱动的角色对话与情感互动。">
    <link rel="stylesheet" href="/static/css/roleplay/01-base.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/02-setup.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/03-chat.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/04-panel.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/05-extra.css?v={{ cb }}">
<body>

<!-- ===== 角色创建界面 ===== -->
<div id="char-setup-screen">
    <div class="setup-card">
        <h2>🎭 角色扮演</h2>
        <p class="subtitle">配置 API Key 后即可开始冒险</p>
        <p style="font-size:0.78rem;color:var(--text-dim);">
            还没有 API Key？
            <a href="https://platform.agnes-ai.com/settings/apiKeys" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:underline;">点击申请 Agnes AI Key →</a>
        </p>
        <div class="form-wrapper">
            <div class="form-group api-key-group">
                <label>对话 API Key <span style="color:var(--danger);">*</span></label>
                <input type="password" id="setup-chat-key" placeholder="输入 Agnes 对话 API Key">
                <button type="button" class="api-key-clear" onclick="clearApiKey('setup-chat-key')" title="清除">清除</button>
            </div>
            <div class="form-group api-key-group">
                <label>生图 API Key <span style="color:#666;font-weight:normal;">（选填，用于生成角色头像）</span></label>
                <input type="password" id="setup-image-key" placeholder="输入 Agnes 生图 API Key">
                <button type="button" class="api-key-clear" onclick="clearApiKey('setup-image-key')" title="清除">清除</button>
            </div>
            <div class="form-group">
                <label>故事设定 <span style="color:#666;font-weight:normal;">（选填）</span></label>
                <textarea id="story-prompt" placeholder="例如：现代都市，女主是一个温柔的外科医生，与我是青梅竹马。&#10;&#10;留空则完全随机生成角色和故事。" rows="4"></textarea>
            </div>
        </div>
        <button class="btn btn-primary" id="btn-create" type="button" onclick="App.createCharacter()">
            开始冒险
        </button>
    </div>
</div>

<!-- ===== 聊天界面 ===== -->
<div id="chat-screen">
    <div class="chat-header">
        <div class="header-left">
            <div class="story-title" id="header-story-title">故事标题</div>
            <div class="story-summary" id="header-story-summary">故事摘要加载中...</div>
        </div>
        <div class="header-actions">
            <button onclick="App.togglePanel('characters')">👥</button>
            <button onclick="App.togglePanel('settings')">⚙️</button>
            <button onclick="App.resetStory()">🔄</button>
        </div>
    </div>

    <div class="chat-messages" id="chat-messages">
        <!-- 消息动态插入 -->
    </div>

    <div class="chat-input-area">
        <textarea id="chat-input" placeholder="输入消息..." rows="1"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();App.sendMessage()}"></textarea>
        <button class="send-btn" id="send-btn" onclick="App.sendMessage()">➤</button>
    </div>

    <!-- 快捷回复选项 -->
    <div class="reply-options" id="reply-options"></div>
</div>

<!-- ===== 侧边面板 ===== -->
<div class="side-panel" id="side-panel">
    <div class="panel-header">
        <h3 id="panel-title">面板</h3>
        <button class="btn btn-sm btn-outline" onclick="App.closePanel()">✕</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
</div>
<div class="overlay" id="panel-overlay" onclick="App.closePanel()"></div>

<!-- ===== 图片放大 ===== -->
<div class="img-overlay" id="img-overlay" onclick="this.classList.remove('show')">
    <img id="img-overlay-img" src="" alt="">
</div>

<!-- ===== 页内日志面板 ===== -->
<div id="rp-log-panel" style="display:none;">
    <div id="rp-log-header" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:2px 4px;border-bottom:1px solid #333;background:#111;user-select:none;">
        <span style="font-size:10px;color:#888;">📋 日志</span>
        <div style="display:flex;gap:4px;">
            <button id="rp-log-copy" title="复制日志" style="background:none;color:#4fc3f7;border:none;font-size:11px;cursor:pointer;line-height:1;">📋</button>
            <button id="rp-log-close" title="收起日志" style="background:none;color:#ef5350;border:none;font-size:14px;cursor:pointer;line-height:1;">×</button>
        </div>
    </div>
    <div id="rp-log-body" style="overflow-y:auto;max-height:160px;"></div>
</div>



<script src="/static/js/roleplay/state.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/ui-core.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/ui-panel.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/create.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/api.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/img-face.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/init.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/chat.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/eval.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/utils.js?v={{ cb }}"></script>

<!-- 日志工具必须在 App.init 之前定义 -->
<script>
// ===== 页内日志工具 =====
window._rpLogEntries = [];
let _rpLogCollapsed = false;
function rpLog(level, tag, msg) {
    const now = new Date();
    const ts = now.toLocaleTimeString('zh-CN', { hour12: false }) + '.' + String(now.getMilliseconds()).padStart(3, '0');
    const entry = { level, tag, msg, t: Date.now(), ts };
    console.log('[' + ts + '] [' + level.toUpperCase() + '] [' + tag + '] ' + msg);
    window._rpLogEntries.push(entry);
    renderLogPanel();
}

// 打印指定元素的计算样式到日志
function logComputedStyles(selector, props) {
    const el = document.querySelector(selector);
    if (!el) { rpLog('warn', 'STYLE', 'selector not found: ' + selector); return; }
    const cs = getComputedStyle(el);
    const info = props.map(p => p + ': ' + cs[p]).join('; ');
    rpLog('info', 'STYLE', selector + ': ' + info);
}
function renderLogPanel() {
    const panel = document.getElementById('rp-log-panel');
    if (!panel) return;
    panel.style.display = 'block';
    const levelColor = { info: '#4fc3f7', warn: '#ffb74d', error: '#ef5350', debug: '#aaa' };
    if (_rpLogCollapsed) {
        panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #333;z-index:9999;';
        panel.innerHTML = '<div id="rp-log-expand" style="padding:4px 8px;font-size:11px;color:#888;cursor:pointer;">' + window._rpLogEntries.length + ' 条日志 · 点击展开</div>';
        document.getElementById('rp-log-expand').onclick = function() {
            _rpLogCollapsed = false;
            rpLog('info', 'LOG', '面板已展开');
        };
        return;
    }
    panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #333;z-index:9999;';
    panel.innerHTML = '<div id="rp-log-header" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:2px 4px;border-bottom:1px solid #333;background:#111;user-select:none;"><span style="font-size:10px;color:#888;">📋 日志 (' + window._rpLogEntries.length + ')</span><div style="display:flex;gap:4px;"><button id="rp-log-copy" title="复制日志" style="background:none;color:#4fc3f7;border:none;font-size:11px;cursor:pointer;line-height:1;">📋</button><button id="rp-log-close" title="收起日志" style="background:none;color:#ef5350;border:none;font-size:14px;cursor:pointer;line-height:1;">×</button></div></div><div id="rp-log-body" style="overflow-y:auto;max-height:160px;"></div>';
    const body = document.getElementById('rp-log-body');
    body.innerHTML = window._rpLogEntries.map(e => {
        const c = levelColor[e.level] || '#ccc';
        return '<div style="color:' + c + ';margin:1px 0;font-size:11px;white-space:pre-wrap;word-break:break-all;"><span style="color:#555;">' + e.ts + '</span> [' + e.tag + ']: ' + e.msg + '</div>';
    }).join('');
    body.scrollTop = body.scrollHeight;
    document.getElementById('rp-log-close').onclick = function(e) {
        e.stopPropagation();
        _rpLogCollapsed = true;
        rpLog('info', 'LOG', '面板已收起');
    };
    document.getElementById('rp-log-copy').onclick = function(e) {
        e.stopPropagation();
        const text = window._rpLogEntries.map(e => e.ts + ' [' + e.tag + ']: ' + e.msg).join('\n');
        navigator.clipboard.writeText(text).then(() => rpLog('info', 'LOG', '日志已复制到剪贴板'));
    };
    document.getElementById('rp-log-header').onclick = function() {
        _rpLogCollapsed = true;
        rpLog('info', 'LOG', '面板已收起');
    };
}
rpLog('info', 'INIT', '日志工具已就绪');

// Global aliases for App methods (so bare function calls work across modules)
window.agnesChat = App.agnesChat;
window.agnesImageGen = App.agnesImageGen;
window.appendArtStyle = App.appendArtStyle;
window.sanitizeImagePrompt = App.sanitizeImagePrompt;
window.buildBackupPrompt = App.buildBackupPrompt;
window.generateCharacterFace = App.generateCharacterFace;
window.generateSceneImage = App.generateSceneImage;
window.parseSceneFromReply = App.parseSceneFromReply;
window.isSceneChanged = App.isSceneChanged;
window.sceneToImagePrompt = App.sceneToImagePrompt;
window.getActiveCharacterFaceUrl = App.getActiveCharacterFaceUrl;
window.addSceneGenStatus = App.addSceneGenStatus;
window.updateEmotions = App.updateEmotions;
window.updateRevealedInfo = App.updateRevealedInfo;
window.updateDynamicAttributes = App.updateDynamicAttributes;
window.saveState = App.saveState;
window.saveMessages = App.saveMessages;
window.loadState = App.loadState;
window.loadMessages = App.loadMessages;
window.showChatScreen = App.showChatScreen;
window.showSetupScreen = App.showSetupScreen;
window.updateStoryHeader = App.updateStoryHeader;
window.renderMessage = App.renderMessage;
window.renderMessages = App.renderMessages;
window.addSystemMessage = App.addSystemMessage;
window.showTyping = App.showTyping;
window.hideTyping = App.hideTyping;
window.truncate = App.truncate;
window.clearApiKey = App.clearApiKey;
window.renderInfoRow = App.renderInfoRow;
window.loadSettings = App.loadSettings;
window.saveSettings = App.saveSettings;
window.restoreApiKeysToInputs = App.restoreApiKeysToInputs;
window.showNewDiscovery = function(msg) {
    const el = document.getElementById('new-discovery-toast');
    if (el) { el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 3000); }
};

// Initialize App after all modules load
document.addEventListener('DOMContentLoaded', function() {
    // 打印当前加载的资源版本
    const cssLink = document.querySelector('link[href*="roleplay.css"]');
    const jsLinks = document.querySelectorAll('script[src*="roleplay/"]');
    if (cssLink) rpLog('info', 'VERSION', 'CSS: ' + cssLink.href.split('?')[1]);
    jsLinks.forEach(s => rpLog('info', 'VERSION', 'JS: ' + s.src.split('?')[1]));
    
    if (typeof App !== 'undefined' && typeof App.init === 'function') {
        App.init();
    }
});
</script>
</body>
</html>
