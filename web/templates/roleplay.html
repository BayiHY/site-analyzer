<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>角色扮演 - 站长工具</title>
    <meta name="description" content="沉浸式角色扮演体验，AI驱动的角色对话与情感互动。">
    <link rel="stylesheet" href="/static/css/roleplay/01-base.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/02-setup.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/03-chat.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/04-panel.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/05-extra.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/06-twostage.css?v={{ cb }}">
<body>

<!-- ===== 角色创建界面 ===== -->
<div id="char-setup-screen">
    <div class="setup-card">
        <h2>🎭 角色扮演</h2>
        <p class="subtitle">配置 API Key 后即可开始冒险</p>
        <p style="font-size:0.78rem;color:var(--text-dim);">
            还没有 API Key？
            <a href="https://platform.agnes-ai.com/settings/apiKeys" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:underline;">点击申请 Agnes AI Key →</a>
        </p>
        <div class="form-wrapper">
            <div class="form-group api-key-group">
                <label>API Key <span style="color:var(--danger);">*</span></label>
                <input type="password" id="setup-chat-key" placeholder="输入 Agnes API Key (sk-...)" autocomplete="off">
                <button type="button" class="api-key-clear" onclick="clearApiKey('setup-chat-key')" title="清除">清除</button>
            </div>
            <div class="form-group">
                <label>🎨 画面风格 <span style="color:#666;font-weight:normal;">（用于角色头像和场景图生成，留空则默认动漫风）</span></label>
                <select id="setup-art-style">
                    <option value="">🎲 随机（由灵感决定）</option>
                    <!-- 一、动画风格 -->
                    <option value="00s josei cel anime">少女向恋爱动画 (Josei)</option>
                    <option value="modern moe cel anime">现代萌系新番 (Modern Moe)</option>
                    <option value="y2k anime">千禧年2000年代初动画 (Y2K Anime)</option>
                    <option value="seinen cel anime">青年写实动画 (Seinen)</option>
                    <option value="three-tone cel shading">极简三色赛璐璐 (Three-Tone)</option>
                    <!-- 二、漫画风格 -->
                    <option value="shoujo manga">少女黑白漫画 (Shoujo Manga)</option>
                    <option value="horror manga">日系恐怖黑白漫画 (Horror Manga)</option>
                    <!-- 三、3D 卡通 -->
                    <option value="blender lowpoly cartoon render">Blender低多边形卡通3D (LowPoly)</option>
                    <option value="anime toon 3d render">二次元三渲二 (Anime Toon 3D)</option>
                    <option value="clay figure render">黏土人偶3D (Clay Figure)</option>
                    <option value="miniature diorama render">微缩模型场景3D (Miniature Diorama)</option>
                    <option value="chibi super deformed 3d">Q版二头身3D (Chibi SD 3D)</option>
                    <!-- 四、通用美术&潮流 -->
                    <option value="transparent watercolor wash">透明水彩 (Transparent Watercolor)</option>
                    <option value="heavy oil painting texture">厚重油画 (Heavy Oil Painting)</option>
                    <option value="digital thick paint illustration">数字厚涂 (Digital Thick Paint)</option>
                    <option value="graphite pencil sketch">石墨铅笔素描 (Graphite Pencil)</option>
                    <option value="chinese ink wash painting">水墨国画 (Chinese Ink Wash)</option>
                    <option value="hard line ink line art">纯硬笔线稿 (Hard Line Art)</option>
                    <option value="neon cyberpunk illustration">赛博朋克霓虹 (Neon Cyberpunk)</option>
                    <option value="vaporwave retro 80s art">蒸汽波80年代复古 (Vaporwave)</option>
                    <option value="dark gothic fantasy illustration">暗黑哥特奇幻 (Dark Gothic Fantasy)</option>
                    <option value="flat vector minimal illustration">扁平矢量极简 (Flat Vector)</option>
                    <option value="pixel art 16bit retro game">16位像素复古游戏 (Pixel Art)</option>
                    <option value="unreal engine photoreal PBR">虚幻引擎照片写实 (UE Photoreal)</option>
                    <option value="pop art screen print">波普丝网印刷 (Pop Art)</option>
                </select>
                <div class="setting-hint" style="font-size:0.75rem;color:var(--text-dim);margin-top:4px;">灵感中检测到画面风格会自动选中，也可手动修改</div>
            </div>
            <div class="form-group">
                <label>故事灵感 <span style="color:#666;font-weight:normal;">（选填）</span></label>
                <textarea id="story-prompt" placeholder="例如：我想和一个温柔的外科医生青梅竹马的故事。&#10;&#10;留空则完全随机生成世界观和角色。" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>玩家角色名 <span style="color:#666;font-weight:normal;">（选填，留空则使用默认名）</span></label>
                <input type="text" id="setup-player-name" placeholder="输入你扮演的角色名字（如：林渊、无名旅者等）" maxlength="20">
                <div class="setting-hint" style="font-size:0.75rem;color:var(--text-dim);margin-top:4px;">建议填写，用于区分玩家角色与NPC角色，避免身份混淆</div>
            </div>
            <div class="form-group">
                <label>玩家性别 <span style="color:var(--danger);">*</span></label>
                <div class="gender-radio-group">
                    <label class="gender-option">
                        <input type="radio" name="player-gender" value="男" checked>
                        <span>♂ 男</span>
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="player-gender" value="女">
                        <span>♀ 女</span>
                    </label>
                </div>
            </div>
        </div>
        <button class="btn btn-primary" id="btn-create" type="button" onclick="App.createCharacter()">
            开始冒险
        </button>
        <button class="btn btn-outline" id="btn-import-archive" type="button" onclick="App.importArchive()" style="margin-top:8px;">
            📂 导入存档
        </button>
    </div>
</div>

<!-- ===== 聊天界面 ===== -->
<div id="chat-screen">
    <!-- 场景背景层 -->
    <div class="scene-bg" id="scene-bg"></div>

    <div class="chat-header">
        <div class="header-left" id="header-story-info" style="cursor:pointer;" onclick="App.togglePanel('story')">
            <div class="story-title" id="header-story-title">故事标题</div>
            <div class="story-summary" id="header-story-summary">故事摘要加载中...</div>
        </div>
        <div class="header-actions">
            <button onclick="App.togglePanel('characters')">👥</button>
            <button onclick="App.togglePanel('settings')">⚙️</button>
            <button onclick="App.resetStory()">🔄</button>
            <button id="tts-toggle-btn" onclick="App.toggleTTS()" title="切换语音">🔊</button>
        </div>
    </div>

    <div class="chat-messages" id="chat-messages">
        <!-- 消息动态插入 -->
    </div>

    <div class="chat-input-area">
        <textarea id="chat-input" placeholder="输入消息..." rows="1"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();App.sendMessage()}"></textarea>
        <button class="send-btn" id="send-btn" onclick="App.sendMessage()">➤</button>
    </div>

    <!-- 快捷回复选项 -->
    <div class="reply-options" id="reply-options"></div>
</div>

<!-- ===== 侧边面板 ===== -->
<div class="side-panel" id="side-panel">
    <div class="panel-header">
        <h3 id="panel-title">面板</h3>
        <button class="btn btn-sm btn-outline" onclick="App.closePanel()">✕</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
</div>
<div class="overlay" id="panel-overlay" onclick="App.closePanel()"></div>

<!-- ===== 图片放大 ===== -->
<div class="img-overlay" id="img-overlay" onclick="this.classList.remove('show')">
    <img id="img-overlay-img" src="" alt="">
</div>

<!-- 页内日志面板 — 内容由 logger.js renderLogPanel() 动态渲染 -->
<div id="rp-log-panel" style="display:none;"></div>

<!-- ===== 导入存档确认弹窗 ===== -->
<div class="import-modal-overlay" id="import-modal" style="display:none;">
    <div class="import-modal-box">
        <h3 id="import-modal-title"></h3>
        <p id="import-modal-desc"></p>
        <div class="import-modal-actions">
            <button class="btn btn-primary" id="import-btn-continue" onclick="App.importArchiveChoice('continue')">继续故事</button>
            <button class="btn btn-outline" id="import-btn-prologue" onclick="App.importArchiveChoice('prologue')">从序章开始</button>
        </div>
    </div>
</div>



<script src="/static/js/roleplay/state.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/worldview-factors.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/logger.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/llm-client.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/llm-retry.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/delimited-parser.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/emotion-update.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/image-api.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/style-calibrator.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/face-images.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/scene-images.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/story-gen.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/char-gen.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/opening-gen.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/two-stage.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/identity-validator.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/chat-sender.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/reply-options.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/message-renderer.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/tts-engine.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/ui-switcher.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/side-panel.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/progressive-disclosure.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/dynamic-attrs.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/create-flow.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/data-io.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/app-init.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/json-parser.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/structured-output.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/unified-structured-output.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/roleplay-structured-agent.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/aliases.js?v={{ cb }}"></script>

<!-- Initialize App after all modules load -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    if (typeof App !== 'undefined' && typeof App.init === 'function') {
        App.init();
    }
});
</script>
</body>
</html>
