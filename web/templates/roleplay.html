<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>角色扮演 - 站长工具</title>
    <meta name="description" content="沉浸式角色扮演体验，AI驱动的角色对话与情感互动。">
    <link rel="stylesheet" href="/static/css/roleplay/01-base.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/02-setup.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/03-chat.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/04-panel.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/05-extra.css?v={{ cb }}">
    <link rel="stylesheet" href="/static/css/roleplay/06-twostage.css?v={{ cb }}">
<body>

<!-- ===== 角色创建界面 ===== -->
<div id="char-setup-screen">
    <div class="setup-card">
        <h2>🎭 角色扮演</h2>
        <p class="subtitle">配置 API Key 后即可开始冒险</p>
        <p style="font-size:0.78rem;color:var(--text-dim);">
            还没有 API Key？
            <a href="https://platform.agnes-ai.com/settings/apiKeys" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:underline;">点击申请 Agnes AI Key →</a>
        </p>
        <div class="form-wrapper">
            <div class="form-group api-key-group">
                <label>对话 API Key <span style="color:var(--danger);">*</span></label>
                <input type="password" id="setup-chat-key" placeholder="输入 Agnes 对话 API Key (sk-...) 或 GLM Key (hex.hex)">
                <button type="button" class="api-key-clear" onclick="clearApiKey('setup-chat-key')" title="清除">清除</button>
            </div>
            <div class="form-group api-key-group">
                <label>生图 API Key <span style="color:#666;font-weight:normal;">（选填，用于生成角色头像）</span></label>
                <input type="password" id="setup-image-key" placeholder="输入 Agnes 生图 API Key" oninput="App.onSetupImageKeyChange()">
                <button type="button" class="api-key-clear" onclick="clearApiKey('setup-image-key')" title="清除">清除</button>
            </div>
            <div class="form-group">
                <label>🎨 画面风格 <span style="color:#666;font-weight:normal;">（用于角色头像和场景图生成，留空则默认动漫风）</span></label>
                <select id="setup-art-style">
                    <option value="anime">动漫风 (anime)</option>
                    <option value="watercolor">水彩风 (watercolor)</option>
                    <option value="oil painting">油画风 (oil painting)</option>
                    <option value="digital realism">数字写实 (digital realism)</option>
                    <option value="pencil sketch">铅笔素描 (pencil sketch)</option>
                    <option value="comic book">漫画风 (comic book)</option>
                    <option value="photorealistic">照片写实 (photorealistic)</option>
                    <option value="3D render">3D渲染 (3D render)</option>
                    <option value="studio ghibli">吉卜力 (Studio Ghibli)</option>
                    <option value="cyberpunk">赛博朋克 (cyberpunk)</option>
                    <option value="fantasy art">奇幻插画 (fantasy art)</option>
                    <option value="chibi">Q版 (chibi)</option>
                    <option value="pixel art">像素风 (pixel art)</option>
                    <option value="ink wash">水墨画 (ink wash)</option>
                    <option value="vaporwave">蒸汽波 (vaporwave)</option>
                    <option value="dark fantasy">暗黑奇幻 (dark fantasy)</option>
                </select>
                <div class="setting-hint" style="font-size:0.75rem;color:var(--text-dim);margin-top:4px;">灵感中检测到画面风格会自动选中，也可手动修改</div>
            </div>
            <div class="form-group">
                <label>故事灵感 <span style="color:#666;font-weight:normal;">（选填）</span></label>
                <textarea id="story-prompt" placeholder="例如：我想和一个温柔的外科医生青梅竹马的故事。&#10;&#10;留空则完全随机生成世界观和角色。" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>玩家性别 <span style="color:var(--danger);">*</span></label>
                <div class="gender-radio-group">
                    <label class="gender-option">
                        <input type="radio" name="player-gender" value="男" checked>
                        <span>♂ 男</span>
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="player-gender" value="女">
                        <span>♀ 女</span>
                    </label>
                </div>
            </div>
        </div>
        <button class="btn btn-primary" id="btn-create" type="button" onclick="App.createCharacter()">
            开始冒险
        </button>
    </div>
</div>

<!-- ===== 聊天界面 ===== -->
<div id="chat-screen">
    <!-- 场景背景层 -->
    <div class="scene-bg" id="scene-bg"></div>

    <div class="chat-header">
        <div class="header-left">
            <div class="story-title" id="header-story-title">故事标题</div>
            <div class="story-summary" id="header-story-summary">故事摘要加载中...</div>
        </div>
        <div class="header-actions">
            <button onclick="App.togglePanel('characters')">👥</button>
            <button onclick="App.togglePanel('settings')">⚙️</button>
            <button onclick="App.resetStory()">🔄</button>
            <button id="tts-toggle-btn" onclick="App.toggleTTS()" title="切换语音">🔊</button>
        </div>
    </div>

    <div class="chat-messages" id="chat-messages">
        <!-- 消息动态插入 -->
    </div>

    <div class="chat-input-area">
        <textarea id="chat-input" placeholder="输入消息..." rows="1"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();App.sendMessage()}"></textarea>
        <button class="send-btn" id="send-btn" onclick="App.sendMessage()">➤</button>
    </div>

    <!-- 快捷回复选项 -->
    <div class="reply-options" id="reply-options"></div>
</div>

<!-- ===== 侧边面板 ===== -->
<div class="side-panel" id="side-panel">
    <div class="panel-header">
        <h3 id="panel-title">面板</h3>
        <button class="btn btn-sm btn-outline" onclick="App.closePanel()">✕</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
</div>
<div class="overlay" id="panel-overlay" onclick="App.closePanel()"></div>

<!-- ===== 图片放大 ===== -->
<div class="img-overlay" id="img-overlay" onclick="this.classList.remove('show')">
    <img id="img-overlay-img" src="" alt="">
</div>

<!-- 页内日志面板 — 内容由 logger.js renderLogPanel() 动态渲染 -->
<div id="rp-log-panel" style="display:none;"></div>



<script src="/static/js/roleplay/state.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/worldview-factors.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/logger.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/llm-client.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/delimited-parser.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/emotion-update.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/image-api.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/face-images.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/scene-images.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/story-gen.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/char-gen.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/two-stage.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/chat-sender.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/reply-options.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/message-renderer.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/tts-engine.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/ui-switcher.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/side-panel.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/progressive-disclosure.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/dynamic-attrs.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/create-flow.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/data-io.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/app-init.js?v={{ cb }}"></script>
<script src="/static/js/roleplay/aliases.js?v={{ cb }}"></script>

<!-- Initialize App after all modules load -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    if (typeof App !== 'undefined' && typeof App.init === 'function') {
        App.init();
    }
});
</script>
</body>
</html>
