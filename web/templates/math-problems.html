<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三位数计算练习题生成器</title>
    <link rel="canonical" href="https://www.bayihy.cn/tools/math-problems">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #4f8a8b;
            --primary-dark: #3a6b6c;
            --bg: #0f1419;
            --bg2: #1a2332;
            --bg3: #243044;
            --text: #e8eaed;
            --text-dim: #9aa0a6;
            --border: #2d3a4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 720px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { font-size: 1.8rem; color: var(--primary); margin-bottom: 8px; }
        .header p { color: var(--text-dim); font-size: 0.9rem; }
        .back-link { display: inline-block; margin-bottom: 16px; color: var(--primary); text-decoration: none; font-size: 0.85rem; }
        .back-link:hover { text-decoration: underline; }

        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 1.1rem; color: var(--primary); margin-bottom: 16px; }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
        }

        .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--primary); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .preview {
            background: #fff;
            color: #1a1a1a;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            font-family: 'Times New Roman', serif;
            display: none;
        }
        .preview.visible { display: block; }
        .preview-page {
            page-break-after: always;
            margin-bottom: 24px;
        }
        .preview-page:last-child { margin-bottom: 0; }
        .preview-section-title {
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
            color: #333;
        }
        .preview-problems {
            display: grid;
            gap: 8px;
        }
        .preview-problems.cols-3 { grid-template-columns: repeat(3, 1fr); }
        .preview-problems.cols-2 { grid-template-columns: repeat(2, 1fr); }
        .preview-problem {
            font-size: 1.2rem;
            text-align: center;
            padding: 6px 0;
            letter-spacing: 1px;
        }
        .preview-page-header {
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #333;
        }

        .status {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
        }
        .status.success { display: block; background: rgba(76,175,80,0.15); color: #81c784; border: 1px solid rgba(76,175,80,0.3); }
        .status.error { display: block; background: rgba(244,67,54,0.15); color: #e57373; border: 1px solid rgba(244,67,54,0.3); }
        .status.info { display: block; background: rgba(79,138,139,0.15); color: #80cbc4; border: 1px solid rgba(79,138,139,0.3); }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .btn-row { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="/tools/toolsbox" class="back-link">← 返回工具箱</a>

    <div class="header">
        <h1>📐 三位数计算练习题生成器</h1>
        <p>随机生成加法、减法、混合运算练习题，预览后直接下载 A4 PDF 打印</p>
    </div>

    <!-- 配置 -->
    <div class="card">
        <h2>⚙️ 题目配置</h2>
        <div class="form-row">
            <div class="form-group">
                <label>加法题数（每页）</label>
                <input type="number" id="addCount" value="6" min="1" max="30">
            </div>
            <div class="form-group">
                <label>减法题数（每页）</label>
                <input type="number" id="subCount" value="6" min="1" max="30">
            </div>
            <div class="form-group">
                <label>混合题数（每页）</label>
                <input type="number" id="mixCount" value="8" min="1" max="30">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>页数</label>
                <select id="pageCount">
                    <option value="1">1 页</option>
                    <option value="2" selected>2 页</option>
                    <option value="3">3 页</option>
                </select>
            </div>
            <div class="form-group">
                <label>每行题数（加/减）</label>
                <select id="addSubCols">
                    <option value="2">2 道/行</option>
                    <option value="3" selected>3 道/行</option>
                </select>
            </div>
            <div class="form-group">
                <label>每行题数（混合）</label>
                <select id="mixCols">
                    <option value="1">1 道/行</option>
                    <option value="2" selected>2 道/行</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>数字范围（最小值）</label>
                <input type="number" id="minNum" value="100" min="10" max="900">
            </div>
            <div class="form-group">
                <label>数字范围（最大值）</label>
                <input type="number" id="maxNum" value="999" min="100" max="9999">
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="generateAndPreview()">🎲 生成预览</button>
            <button class="btn btn-secondary" onclick="downloadPDF()" id="downloadBtn">📥 下载 PDF</button>
        </div>
        <div id="status" class="status"></div>
    </div>

    <!-- 预览 -->
    <div class="card">
        <h2>👁️ 预览</h2>
        <div id="preview" class="preview"></div>
    </div>
</div>

<script>
// ===== 工具函数 =====
function randInt(min, max) {
    if (min >= max) return min;
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = randInt(0, i);
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

// ===== 生成算式（保证数学合法性）=====
function genAddition(n, minN, maxN) {
    const results = [];
    for (let i = 0; i < n; i++) {
        const maxA = maxN - minN;
        const a = randInt(minN, maxA);
        const b = randInt(minN, maxN - a);
        results.push({ a, b, op: '+' });
    }
    return results;
}

function genSubtraction(n, minN, maxN) {
    const results = [];
    for (let i = 0; i < n; i++) {
        const minA = Math.max(minN * 2, minN + 100);
        const a = randInt(minA, maxN);
        const b = randInt(minN, a - minN);
        results.push({ a, b, op: '-' });
    }
    return results;
}

function genMixed(n, minN, maxN) {
    const results = [];
    const patterns = ['++', '--', '+-', '-+'];
    const patternList = [];
    while (patternList.length < n) {
        for (const p of patterns) patternList.push(p);
    }
    shuffle(patternList).slice(0, n).forEach(pattern => {
        if (pattern === '++') {
            let a, b, c;
            do {
                a = randInt(minN, Math.floor(maxN / 3));
                b = randInt(minN, Math.floor((maxN - a) / 2));
                c = randInt(minN, maxN - a - b);
            } while (c < minN || a + b + c > maxN);
            results.push({ a, b, c, op1: '+', op2: '+' });
        } else if (pattern === '--') {
            let a, b, c;
            do {
                a = randInt(Math.max(minN * 3, minN + 200), maxN);
                b = randInt(minN, a - minN * 2);
                const remain = a - b;
                c = randInt(minN, remain - minN);
            } while (c < minN || a - b - c < minN);
            results.push({ a, b, c, op1: '-', op2: '-' });
        } else if (pattern === '+-') {
            let a, b, c, diff;
            do {
                a = randInt(Math.max(minN * 2, minN + 100), maxN);
                b = randInt(minN, a - minN);
                diff = a - b;
                c = randInt(minN, maxN - diff);
            } while (c < minN || diff + c > maxN);
            results.push({ a, b, c, op1: '-', op2: '+' });
        } else {
            let a, b, c, sum;
            do {
                a = randInt(minN, Math.floor(maxN / 2));
                b = randInt(minN, Math.floor((maxN - a) / 2));
                sum = a + b;
                c = randInt(minN, sum - minN);
            } while (c < minN || a + b - c < minN);
            results.push({ a, b, c, op1: '+', op2: '-' });
        }
    });
    return results;
}

function fmtAdd(e) { return `${e.a} + ${e.b} =`; }
function fmtSub(e) { return `${e.a} − ${e.b} =`; }
function fmtMix(e) { return `${e.a} ${e.op1} ${e.b} ${e.op2} ${e.c} =`; }

// ===== 全局状态 =====
let currentProblems = null;

function generateAll() {
    const addCount = parseInt(document.getElementById('addCount').value) || 6;
    const subCount = parseInt(document.getElementById('subCount').value) || 6;
    const mixCount = parseInt(document.getElementById('mixCount').value) || 8;
    const pageCount = parseInt(document.getElementById('pageCount').value) || 2;
    const minN = parseInt(document.getElementById('minNum').value) || 100;
    const maxN = parseInt(document.getElementById('maxNum').value) || 999;

    const perPage = Math.ceil(pageCount);
    const totalAdds = addCount * perPage;
    const totalSubs = subCount * perPage;
    const totalMixes = mixCount * perPage;

    const adds = genAddition(totalAdds, minN, maxN);
    const subs = genSubtraction(totalSubs, minN, maxN);
    const mixes = genMixed(totalMixes, minN, maxN);

    const pages = [];
    for (let p = 0; p < perPage; p++) {
        pages.push({
            adds: adds.slice(p * addCount, (p + 1) * addCount),
            subs: subs.slice(p * subCount, (p + 1) * subCount),
            mixes: mixes.slice(p * mixCount, (p + 1) * mixCount),
        });
    }

    return pages;
}

// ===== 渲染预览 =====
function renderPreview(pages) {
    const container = document.getElementById('preview');
    container.innerHTML = '';

    pages.forEach((page, idx) => {
        const div = document.createElement('div');
        div.className = 'preview-page';
        div.innerHTML = `
            <div class="preview-page-header">第 ${idx + 1} 页 · 三位数计算练习</div>
            <div class="preview-section-title">一、加法</div>
            <div class="preview-problems cols-3">
                ${page.adds.map(fmtAdd).map(s => `<div class="preview-problem">${s}</div>`).join('')}
            </div>
            <div class="preview-section-title" style="margin-top:16px;">二、减法</div>
            <div class="preview-problems cols-3">
                ${page.subs.map(fmtSub).map(s => `<div class="preview-problem">${s}</div>`).join('')}
            </div>
            <div class="preview-section-title" style="margin-top:16px;">三、混合运算</div>
            <div class="preview-problems cols-2">
                ${page.mixes.map(fmtMix).map(s => `<div class="preview-problem">${s}</div>`).join('')}
            </div>
        `;
        container.appendChild(div);
    });

    container.classList.add('visible');
}

// ===== 生成并预览 =====
async function generateAndPreview() {
    const status = document.getElementById('status');
    try {
        const pages = generateAll();
        currentProblems = pages;
        renderPreview(pages);
        showStatus(status, 'success', `✅ 已生成 ${pages.length} 页，共 ${pages.reduce((s, p) => s + p.adds.length + p.subs.length + p.mixes.length, 0)} 道题`);
    } catch (e) {
        showStatus(status, 'error', `❌ 生成失败: ${e.message}`);
    }
}

// ===== 下载 PDF（用 html2canvas 截图渲染后的预览，解决 jsPDF 不支持中文的问题）=====
async function downloadPDF() {
    const status = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');

    if (!currentProblems || currentProblems.length === 0) {
        showStatus(status, 'error', '⚠️ 请先生成预览');
        return;
    }

    try {
        downloadBtn.disabled = true;
        downloadBtn.textContent = '⏳ 生成 PDF 中...';

        // 创建临时打印容器
        const printContainer = document.createElement('div');
        printContainer.style.cssText = 'position:absolute;left:-9999px;top:0;width:794px;background:#fff;color:#000;font-family:"Times New Roman",serif;padding:20px;';
        document.body.appendChild(printContainer);

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'p', unit: 'px', format: [794, 1123] }); // A4 @ 96dpi

        const pages = currentProblems;
        for (let idx = 0; idx < pages.length; idx++) {
            if (idx > 0) doc.addPage([794, 1123]);

            const pageDiv = document.createElement('div');
            pageDiv.style.cssText = 'width:794px;padding:60px 80px 60px 80px;box-sizing:border-box;';
            pageDiv.innerHTML = `
                <div style="text-align:center;font-size:24px;font-weight:bold;margin-bottom:20px;padding-bottom:10px;border-bottom:3px solid #000;">第 ${idx + 1} 页 · 三位数计算练习</div>
                <div style="text-align:center;font-size:18px;font-weight:bold;margin-top:20px;margin-bottom:10px;">一、加法</div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">${pages[idx].adds.map(fmtAdd).map(s => `<div style="text-align:center;font-size:20px;padding:6px 0;letter-spacing:2px;">${s}</div>`).join('')}</div>
                <div style="text-align:center;font-size:18px;font-weight:bold;margin-top:30px;margin-bottom:10px;">二、减法</div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">${pages[idx].subs.map(fmtSub).map(s => `<div style="text-align:center;font-size:20px;padding:6px 0;letter-spacing:2px;">${s}</div>`).join('')}</div>
                <div style="text-align:center;font-size:18px;font-weight:bold;margin-top:30px;margin-bottom:10px;">三、混合运算</div>
                <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">${pages[idx].mixes.map(fmtMix).map(s => `<div style="text-align:center;font-size:20px;padding:6px 0;letter-spacing:2px;">${s}</div>`).join('')}</div>
            `;
            printContainer.appendChild(pageDiv);
        }

        // 等待字体加载后截图
        await document.fonts.ready;
        await new Promise(r => setTimeout(r, 300));

        for (let idx = 0; idx < pages.length; idx++) {
            const pageDiv = printContainer.children[idx];
            const canvas = await html2canvas(pageDiv, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff',
                width: 794,
                height: 1123,
                windowWidth: 794,
                windowHeight: 1123,
            });

            const imgData = canvas.toDataURL('image/png');
            const pageW = doc.internal.pageSize.getWidth();
            const pageH = doc.internal.pageSize.getHeight();
            doc.addImage(imgData, 'PNG', 0, 0, pageW, pageH);
        }

        document.body.removeChild(printContainer);

        const filename = `三位数计算练习题_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.pdf`;
        doc.save(filename);
        showStatus(status, 'success', `✅ PDF 已下载: ${filename}`);
    } catch (e) {
        showStatus(status, 'error', `❌ PDF 生成失败: ${e.message}`);
    } finally {
        downloadBtn.disabled = false;
        downloadBtn.textContent = '📥 下载 PDF';
    }
}

function showStatus(el, type, msg) {
    el.className = `status ${type}`;
    el.textContent = msg;
}

// 页面加载时自动生成一次
window.addEventListener('DOMContentLoaded', () => {
    generateAndPreview();
});
</script>
</body>
</html>
