<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加减法计算练习题生成器</title>
    <link rel="canonical" href="https://www.bayihy.cn/tools/math-problems">
    <link rel="stylesheet" href="/static/css/math-problems.css">
</head>
<body>
<div class="container">
    <a href="/tools/toolsbox" class="back-link" id="backLink">← 返回工具箱</a>

    <div class="header" id="pageTitle">
        <h1>📐 加减法计算练习题生成器</h1>
        <p>生成加法、减法和混合运算练习，适合 A4 纸打印</p>
    </div>

    <!-- Preview -->
    <div id="preview" class="preview"></div>

    <!-- 广告位 -->
    <div class="ad-space">
        <span class="ad-label">广告</span>
        <div class="ad-content" id="adContent">
            <p style="color: var(--text-dim); font-size: 0.85rem;">广告位招商中...</p>
        </div>
    </div>

    <!-- Buttons -->
    <div class="card">
        <div class="btn-row">
            <button class="btn btn-primary" onclick="generateAndPreview()">🎲 随机生成</button>
            <button class="btn btn-share" onclick="openShareModal()">🔗 分享</button>
            <button class="btn btn-secondary" onclick="downloadPDF()" id="downloadBtn">📥 下载 PDF</button>
            <button class="btn btn-secondary" onclick="resetParams()">🔄 重置参数</button>
        </div>
        <div id="status" class="status"></div>
    </div>

    <!-- Parameter Settings -->
    <div class="card">
        <h2>⚙️ 参数设置</h2>
        <div class="form-row">
            <div class="form-group">
                <label>加法题数（每页）</label>
                <input type="number" id="addCount" value="6" min="1" max="30">
            </div>
            <div class="form-group">
                <label>减法题数（每页）</label>
                <input type="number" id="subCount" value="6" min="1" max="30">
            </div>
            <div class="form-group">
                <label>混合运算题数（每页）</label>
                <input type="number" id="mixCount" value="8" min="1" max="30">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>页数</label>
                <input type="number" id="pageCount" value="1" min="1" max="10">
            </div>
            <div class="form-group">
                <label>加/减每行列数</label>
                <input type="number" id="addSubCols" value="3" min="1" max="6">
            </div>
            <div class="form-group">
                <label>混合运算每行列数</label>
                <input type="number" id="mixCols" value="2" min="1" max="4">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>最小数值</label>
                <input type="number" id="minNum" value="100" min="0" max="9999">
            </div>
            <div class="form-group">
                <label>最大数值</label>
                <input type="number" id="maxNum" value="999" min="10" max="99999">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>字号（px）</label>
                <input type="number" id="fontSize" value="12" min="6" max="30">
            </div>
            <div class="form-group">
                <label>加/减网格间距（px）</label>
                <input type="number" id="gapAddSub" value="12" min="0" max="100">
            </div>
            <div class="form-group">
                <label>混合运算网格间距（px）</label>
                <input type="number" id="gapMixed" value="48" min="0" max="200">
            </div>
            <div class="form-group">
                <label>字间距（px）</label>
                <input type="number" id="letterSpacing" value="0" min="-5" max="20">
            </div>
            <div class="form-group">
                <label>混合运算行高（px）</label>
                <input type="number" id="lineHeightMixed" value="8" min="0" max="50">
            </div>
        </div>
    </div>
</div>

<!-- 分享弹窗 -->
<div class="share-modal-overlay" id="shareModal">
    <div class="share-modal">
        <h3>🔗 分享此页面</h3>
        <img id="sharePreviewImg" class="share-preview-img" src="" alt="预览图">
        <p class="share-hint">可长按图片保存或转发</p>
        <button class="share-close" onclick="closeShareModal()">关闭</button>
    </div>
</div>

<!-- 页内日志面板 — 内容由 logger.js renderLogPanel() 动态渲染 -->
<div id="rp-log-panel" style="display:none;"></div>

<!-- 前端 PDF 生成库 -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<!-- QR Code -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<!-- 页内日志 -->
<script src="/static/js/math-problems-logger.js?v={{ cb }}"></script>
<!-- 业务逻辑 -->
<script src="/static/js/math-problems.js?v=4"></script>

<!-- 页脚 -->
<div class="footer">
    <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px;">
        站长工具 · © <a href="https://gitcode.com/BayiHY" target="_blank" style="color:inherit;">巴依浩爷(BayiHY)</a> · 免费开源 · 隐私优先 · 数据不存储<br>
        <a href="https://beian.miit.gov.cn/" target="_blank" style="color:#888;font-size:11px;text-decoration:none;">新ICP备2026003879号-1</a>
        <span style="color:#555;"> · </span>
        <a href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=65010302001591" target="_blank" style="color:#888;font-size:11px;text-decoration:none;">新公网安备65010302001591号</a>
    </div>
    <div style="font-size:11px;color:#666;">
        <a href="/tools/toolsbox" style="color:#888;margin:0 8px;text-decoration:none;">🧰 工具箱</a> ·
        <a href="/tools/about" style="color:#888;margin:0 8px;text-decoration:none;">ℹ️ 关于</a> ·
        <a href="/tools/privacy" style="color:#888;margin:0 8px;text-decoration:none;">🔒 隐私政策</a> ·
        <a href="/tools/disclaimer" style="color:#888;margin:0 8px;text-decoration:none;">📋 免责条款</a> ·
        <a href="https://gitcode.com/BayiHY/site-analyzer" target="_blank" style="color:#888;margin:0 8px;text-decoration:none;">⭐ 给个Star</a>
    </div>
</div>

<style>
.footer {
    text-align: center;
    padding: 24px 0 12px;
    color: var(--text-dim);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 20px;
}
.footer a { color: var(--primary); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>

</body>
</html>
