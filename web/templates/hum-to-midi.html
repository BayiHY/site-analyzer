<script>
// ========== 音高检测核心 ==========
class PitchDetector {
    constructor(sampleRate) {
        this.sampleRate = sampleRate;
        this.MIN_FREQ = 60;   // 低音C2
        this.MAX_FREQ = 1200; // 高音D6
    }
    
    // 自相关算法检测音高
    detect(float32Buffer) {
        const SIZE = float32Buffer.length;
        const MAX_PERIOD = Math.floor(this.sampleRate / this.MIN_FREQ);
        const MIN_PERIOD = Math.floor(this.sampleRate / this.MAX_FREQ);
        
        // 计算自相关
        const correlations = new Float32Array(MAX_PERIOD + 1);
        for (let lag = MIN_PERIOD; lag <= MAX_PERIOD; lag++) {
            let sum = 0;
            for (let i = 0; i < SIZE - lag; i++) {
                sum += float32Buffer[i] * float32Buffer[i + lag];
            }
            correlations[lag] = sum;
        }
        
        // 找最大相关峰值
        let maxCorr = -1;
        let maxLag = -1;
        for (let lag = MIN_PERIOD; lag <= MAX_PERIOD; lag++) {
            if (correlations[lag] > maxCorr) {
                maxCorr = correlations[lag];
                maxLag = lag;
            }
        }
        
        if (maxLag < 0) return null;
        
        const freq = this.sampleRate / maxLag;
        
        // 验证相关性足够强
        const threshold = 0.01;
        if (maxCorr < threshold) return null;
        
        return freq;
    }
    
    // 频率转MIDI音符编号
    freqToMidi(freq) {
        return Math.round(12 * Math.log2(freq / 440) + 69);
    }
    
    // MIDI编号转音符名
    midiToNote(midi) {
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const octave = Math.floor(midi / 12) - 1;
        const note = notes[midi % 12];
        return `${note}${octave}`;
    }
}

// ========== MIDI文件生成 ==========
class MIDIWriter {
    constructor() {
        this.notes = [];
        this.tempo = 120; // BPM
    }
    
    addNote(midiNote, startTime, duration) {
        this.notes.push({ midiNote, startTime, duration });
    }
    
    generate() {
        const ticksPerBeat = 480;
        const ticksPerSecond = (ticksPerBeat * this.tempo) / 60;
        
        // MIDI文件头
        const header = [
            0x4D, 0x54, 0x68, 0x64, // "MThd"
            0x00, 0x00, 0x00, 0x06, // 头长度
            0x00, 0x00, // 格式0
            0x00, 0x01, // 音轨数
            (ticksPerBeat >> 8) & 0xFF, ticksPerBeat & 0xFF // ticks per beat
        ];
        
        // 音轨事件
        const events = [];
        events.push([0, 0xC0, 0]); // 程序变更：钢琴
        
        for (const note of this.notes) {
            const startTick = Math.floor(note.startTime * ticksPerSecond);
            const durationTicks = Math.floor(note.duration * ticksPerSecond);
            
            events.push([startTick, 0x90, note.midiNote, 80]); // Note On
            events.push([startTick + durationTicks, 0x80, note.midiNote, 0]); // Note Off
        }
        
        // 排序事件
        events.sort((a, b) => a[0] - b[0]);
        
        // 转换为Delta Time
        const trackData = [];
        let lastTick = 0;
        for (const event of events) {
            const delta = event[0] - lastTick;
            trackData.push(...this.toVariableLength(delta));
            trackData.push(event[1], event[2], event[3] || 0);
            lastTick = event[0];
        }
        
        // 结束事件
        trackData.push(0x00, 0xFF, 0x2F, 0x00);
        
        // 音轨头
        const trackHeader = [
            0x4D, 0x54, 0x72, 0x6B, // "MTrk"
            (trackData.length >> 24) & 0xFF,
            (trackData.length >> 16) & 0xFF,
            (trackData.length >> 8) & 0xFF,
            trackData.length & 0xFF
        ];
        
        return new Uint8Array([...header, ...trackHeader, ...trackData]);
    }
    
    toVariableLength(value) {
        const bytes = [];
        bytes.push(value & 0x7F);
        value >>= 7;
        while (value > 0) {
            bytes.unshift((value & 0x7F) | 0x80);
            value >>= 7;
        }
        return bytes;
    }
}

// ========== 输入模式管理 ==========
function setInputMode(mode) {
    // 检查系统内录是否可用
    if (mode === 'system') {
        if (!navigator.mediaDevices || typeof navigator.mediaDevices.getDisplayMedia !== 'function') {

            return;
        }

    inputMode = mode;
    
    // 更新按钮状态

    document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');

// ========== Web MIDI API ==========
async function initMIDI() {
    const select = document.getElementById('midiDeviceSelect');
    select.innerHTML = '<option value="">选择MIDI设备...</option>';
    
    // 添加虚拟键盘选项（始终可用）
    const virtualOption = document.createElement('option');
    virtualOption.value = 'virtual-keyboard';
    virtualOption.textContent = '🎹 虚拟键盘（页面内）';
    select.appendChild(virtualOption);
    
    if (!navigator.requestMIDIAccess) {
        document.getElementById('midiStatus').textContent = '仅虚拟键盘';
        document.getElementById('midiStatus').style.color = 'var(--warning)';
        return;
    }
    
    try {
        midiAccess = await navigator.requestMIDIAccess();
        const inputs = Array.from(midiAccess.inputs.values());
        
        inputs.forEach((input, i) => {
            const option = document.createElement('option');
            option.value = input.id;
            option.textContent = input.name || `MIDI Input ${i + 1}`;
            select.appendChild(option);
        });
        
        if (inputs.length === 0) {
            document.getElementById('midiStatus').textContent = '仅虚拟键盘';
            document.getElementById('midiStatus').style.color = 'var(--warning)';
        } else {
            document.getElementById('midiStatus').textContent = `${inputs.length} 设备 + 虚拟键盘`;
            document.getElementById('midiStatus').style.color = 'var(--success)';
        }
        
        // 监听设备连接/断开
        midiAccess.onstatechange = (e) => {
            const inputs = Array.from(midiAccess.inputs.values());
            const select = document.getElementById('midiDeviceSelect');
            select.innerHTML = '<option value="">选择MIDI设备...</option>';
            
            // 重新添加虚拟键盘选项
            const virtualOption = document.createElement('option');
            virtualOption.value = 'virtual-keyboard';
            virtualOption.textContent = '🎹 虚拟键盘（页面内）';
            select.appendChild(virtualOption);
            
            inputs.forEach((input, i) => {
                const option = document.createElement('option');
                option.value = input.id;
                option.textContent = input.name || `MIDI Input ${i + 1}`;
                select.appendChild(option);
            });
            
            if (inputs.length === 0) {
                document.getElementById('midiStatus').textContent = '仅虚拟键盘';
            } else {
                document.getElementById('midiStatus').textContent = `${inputs.length} 设备 + 虚拟键盘`;
            }
        };
        
    } catch (err) {
        document.getElementById('midiStatus').textContent = '仅虚拟键盘';
        document.getElementById('midiStatus').style.color = 'var(--warning)';
    }
}

function handleMIDIMessage(event) {
    if (!isRecording || inputMode !== 'midi') return;
    
    const [status, noteNumber, velocity] = event.data;
    const command = status >> 4;
    
    // Note On (0x9) with velocity > 0
    if (command === 9 && velocity > 0) {
        const noteName = pitchDetector ? pitchDetector.midiToNote(noteNumber) : `Note ${noteNumber}`;
        
        // 显示当前音符
        currentNoteEl.textContent = noteName;
        currentFreqEl.textContent = `MIDI ${noteNumber} | Vel ${velocity}`;
        
        // 记录开始时间
        midiNotesOn.set(noteNumber, {
            startTime: audioContext.currentTime - recordStartTime,
            noteName: noteName
        });
        
        // 高亮状态和虚拟键盘
        statusDot.classList.add('midi');
        highlightKey(noteNumber);
        
    // Note Off (0x8) or Note On with velocity 0
    } else if (command === 8 || (command === 9 && velocity === 0)) {
        const noteInfo = midiNotesOn.get(noteNumber);
        if (noteInfo) {
            const duration = (audioContext.currentTime - recordStartTime) - noteInfo.startTime;
            const minDur = parseFloat(document.getElementById('minDuration').value);
            
            if (duration >= minDur) {
                recordedNotes.push({
                    midiNote: noteNumber,
                    noteName: noteInfo.noteName,
                    startTime: noteInfo.startTime,
                    duration: duration,
                    fromKeyboard: true
                });
                displayNotes();
            }
            
            midiNotesOn.delete(noteNumber);
        }
        
        // 取消虚拟键盘高亮
        unhighlightKey(noteNumber);
        
        // 如果没有按着的键，取消高亮
        if (midiNotesOn.size === 0) {
            statusDot.classList.remove('midi');
            currentNoteEl.textContent = '--';
            currentFreqEl.textContent = '等待按键...';
        }
    }
}

// ========== 录音控制 ==========
async function startRecording() {
    try {
        recordStartTime = 0;
        recordedNotes = [];
        midiNotesOn.clear();
        
        if (inputMode === 'midi') {
            // MIDI键盘模式
            const selectedDeviceId = document.getElementById('midiDeviceSelect').value;
            if (!selectedDeviceId) {
                alert('请先选择MIDI设备或虚拟键盘');
                return;
            }
            
            // 初始化AudioContext（用于时间戳）
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            pitchDetector = new PitchDetector(audioContext.sampleRate);
            
            // 检查是否选择虚拟键盘
            if (selectedDeviceId === 'virtual-keyboard') {
                // 虚拟键盘模式：复用 pianoContext 作为 audioContext
                // 确保 pianoContext 存在且处于运行状态
                if (!pianoContext) {
                    pianoContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (pianoContext.state === 'suspended') {
                    await pianoContext.resume();
                }
                
                // 复用 pianoContext
                audioContext = pianoContext;
                pitchDetector = new PitchDetector(audioContext.sampleRate);
                
                isRecording = true;
                recordStartTime = audioContext.currentTime;
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                clearBtn.disabled = true;
                statusDot.classList.add('ready');
                statusText.textContent = '虚拟键盘录制中（点击钢琴键）...';
                
            } else {
                // 物理MIDI设备模式
                if (!midiAccess) {
                    alert('MIDI API 未初始化，请刷新页面重试');
                    return;
                }
                
                midiInput = midiAccess.inputs.get(selectedDeviceId);
                if (!midiInput) {
                    alert('无法连接MIDI设备');
                    return;
                }
                
                midiInput.onmidimessage = handleMIDIMessage;
                
                isRecording = true;
                recordStartTime = audioContext.currentTime;
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                clearBtn.disabled = true;
                statusDot.classList.add('ready');
                statusText.textContent = 'MIDI键盘录制中...';
            }
            
        } else if (inputMode === 'system') {
            // 系统内录模式
            // 检查浏览器支持
            if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
                alert('您的浏览器不支持系统内录功能。\n\n请使用 Chrome 94+、Edge 94+ 或 Firefox 52+ 浏览器。\n\n注意：需要 HTTPS 或 localhost 环境。');
                return;
            }
            
            let displayStream;
            try {
                displayStream = await navigator.mediaDevices.getDisplayMedia({
                    video: true,
                    audio: true
                });
            } catch (err) {
                if (err.name === 'NotAllowedError') {
                    alert('用户取消了屏幕共享选择。');
                } else if (err.name === 'NotSupportedError') {
                    alert('您的浏览器不支持音频捕获。\n\n请尝试更新浏览器或使用 Chrome/Edge。');
                } else {
                    alert('启动系统内录失败：' + err.message + '\n\n提示：系统内录需要 HTTPS 环境。');
                }
                console.error('getDisplayMedia error:', err);
                return;
            }
            
            // 检查是否有音频轨道
            const audioTracks = displayStream.getAudioTracks();
            if (audioTracks.length === 0) {
                displayStream.getTracks().forEach(t => t.stop());
                alert('未检测到系统音频轨道。\n\n请在选择共享窗口时：\n1. 勾选"共享音频"或"Share audio"选项\n2. Chrome: 点击"标签页"选项卡，勾选底部"共享此标签页的音频"\n3. Edge: 选择"浏览器标签页"后勾选"包含标签页音频"');
                return;
            }
            
            console.log('✅ 系统内录已启动，音频轨道:', audioTracks.map(t => t.label));
            
            // 创建音频上下文
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(displayStream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);
            
            stream = displayStream;
            pitchDetector = new PitchDetector(audioContext.sampleRate);
            
            isRecording = true;
            currentNoteStart = null;
            lastDetectedMidi = null;
            
            startBtn.disabled = true;
            stopBtn.disabled = false;
            clearBtn.disabled = true;
            statusDot.classList.add('recording');
            statusText.textContent = '系统内录中...';
            
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            detect();
            
        } else {
            // 麦克风模式（原有逻辑）
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);
            
            pitchDetector = new PitchDetector(audioContext.sampleRate);
            
            isRecording = true;
            currentNoteStart = null;
            lastDetectedMidi = null;
            
            startBtn.disabled = true;
            stopBtn.disabled = false;
            clearBtn.disabled = true;
            statusDot.classList.add('recording');
            statusText.textContent = '正在录音...';
            
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            detect();
        }
        
    } catch (err) {
        alert('启动失败：' + err.message);
        console.error(err);
    }
}

function stopRecording() {
    isRecording = false;
    
    if (animationId) {
        cancelAnimationFrame(animationId);
    }
    
    if (stream) {
        stream.getTracks().forEach(t => t.stop());
    }
    
    if (midiInput) {
        midiInput.onmidimessage = null;
    }
    
    // 处理还在按着的MIDI键
    if (midiNotesOn.size > 0) {
        const now = audioContext.currentTime - recordStartTime;
        midiNotesOn.forEach((noteInfo, noteNumber) => {
            const duration = now - noteInfo.startTime;
            if (duration >= parseFloat(document.getElementById('minDuration').value)) {
                recordedNotes.push({
                    midiNote: noteNumber,
                    noteName: noteInfo.noteName,
                    startTime: noteInfo.startTime,
                    duration: duration,
                    fromKeyboard: true
                });
            }
        });
        midiNotesOn.clear();
    }
    
    if (audioContext) {
        // 麦克风/系统内录模式：保存最后一个音符
        if (inputMode !== 'midi' && currentNoteStart !== null && lastDetectedMidi !== null) {
            const duration = audioContext.currentTime - currentNoteStart;
            if (duration >= parseFloat(document.getElementById('minDuration').value)) {
                recordedNotes.push({
                    midiNote: lastDetectedMidi,
                    noteName: lastDetectedNote,
                    startTime: currentNoteStart,
                    duration: duration
                });
            }
        }
    }
    
    startBtn.disabled = false;
    stopBtn.disabled = true;
    clearBtn.disabled = false;
    statusDot.classList.remove('recording', 'midi');
    statusDot.classList.add('ready');
    statusText.textContent = `录制完成，检测到 ${recordedNotes.length} 个音符`;
    
    displayNotes();
}

function clearRecording() {
    recordedNotes = [];
    midiNotesOn.clear();
    notesList.innerHTML = '';
    notesCard.style.display = 'none';
    currentNoteEl.textContent = '--';
    currentFreqEl.textContent = '等待输入...';
    statusDot.classList.remove('ready');
    statusText.textContent = '选择输入源后开始';
    clearBtn.disabled = true;
}

// ========== 音高检测循环 ==========
function detect() {
    if (!isRecording) return;
    
    const bufferLength = analyser.fftSize;
    const buffer = new Float32Array(bufferLength);
    analyser.getFloatTimeDomainData(buffer);
    
    // 绘制波形
    drawWaveform(buffer);
    
    // 检测音高
    const sensitivity = document.getElementById('sensitivity').value;
    
    // 计算RMS判断是否有声音
    let rms = 0;
    for (let i = 0; i < buffer.length; i++) {
        rms += buffer[i] * buffer[i];
    }
    rms = Math.sqrt(rms / buffer.length);
    
    if (rms > 0.01) { // 有声音输入
        const freq = pitchDetector.detect(buffer);
        
        if (freq && freq > pitchDetector.MIN_FREQ && freq < pitchDetector.MAX_FREQ) {
            const midi = pitchDetector.freqToMidi(freq);
            const noteName = pitchDetector.midiToNote(midi);
            
            currentNoteEl.textContent = noteName;
            currentFreqEl.textContent = `${freq.toFixed(1)} Hz | MIDI ${midi}`;
            
            // 音符变化检测
            if (lastDetectedMidi !== midi) {
                // 取消上一个键的高亮
                if (lastDetectedMidi !== null) {
                    unhighlightKey(lastDetectedMidi);
                }
                
                // 保存上一个音符
                if (currentNoteStart !== null && lastDetectedMidi !== null) {
                    const duration = audioContext.currentTime - currentNoteStart;
                    if (duration >= parseFloat(document.getElementById('minDuration').value)) {
                        recordedNotes.push({
                            midiNote: lastDetectedMidi,
                            noteName: lastDetectedNote,
                            startTime: currentNoteStart,
                            duration: duration
                        });
                    }
                }
                // 开始新音符
                currentNoteStart = audioContext.currentTime;
                lastDetectedMidi = midi;
                lastDetectedNote = noteName;
                
                // 高亮虚拟键盘
                highlightKey(midi);
            }
        }
    } else {
        currentNoteEl.textContent = '--';
        currentFreqEl.textContent = '等待声音...';
        
        // 静音时结束当前音符
        if (currentNoteStart !== null && lastDetectedMidi !== null) {
            const duration = audioContext.currentTime - currentNoteStart;
            if (duration >= parseFloat(document.getElementById('minDuration').value)) {
                recordedNotes.push({
                    midiNote: lastDetectedMidi,
                    noteName: lastDetectedNote,
                    startTime: currentNoteStart,
                    duration: duration
                });
            }
            // 取消高亮
            unhighlightKey(lastDetectedMidi);
            currentNoteStart = null;
            lastDetectedMidi = null;
        }
    }
    
    animationId = requestAnimationFrame(detect);
}

function drawWaveform(buffer) {
    ctx.fillStyle = '#1a2332';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#4f8a8b';
    ctx.beginPath();
    
    const sliceWidth = canvas.width / buffer.length;
    let x = 0;
    
    for (let i = 0; i < buffer.length; i++) {
        const v = buffer[i];
        const y = (v + 1) / 2 * canvas.height;
        
        if (i === 0) {
            ctx.moveTo(x, y);
        } else {
            ctx.lineTo(x, y);
        }
        x += sliceWidth;
    }
    
    ctx.stroke();
}

function displayNotes() {
    if (recordedNotes.length === 0) {
        notesCard.style.display = 'none';
        return;
    }
    
    notesCard.style.display = 'block';
    
    // 智能显示：和弦用方括号包裹
    let html = '';
    let i = 0;
    while (i < recordedNotes.length) {
        const note = recordedNotes[i];
        if (note.isChord) {
            // 找到这个和弦的所有音符（连续的 isChord=true）
            const chordNotes = [];
            while (i < recordedNotes.length && recordedNotes[i].isChord) {
                chordNotes.push(recordedNotes[i]);
                i++;
            }
            // 和弦显示：[C4·E4·G4]
            html += `<span class="midi-note chord">${chordNotes.map(n => n.noteName).join('·')}</span>`;
        } else {
            // 单音显示
            html += `<span class="midi-note ${note.fromKeyboard ? 'from-keyboard' : ''}">${note.noteName}</span>`;
            i++;
        }
    }
    notesList.innerHTML = html;
}

function exportMIDI() {
    if (recordedNotes.length === 0) {
        alert('没有可导出的音符');
        return;
    }
    
    const midi = new MIDIWriter();
    for (const note of recordedNotes) {
        midi.addNote(note.midiNote, note.startTime, note.duration);
    }
    
    const data = midi.generate();
    const blob = new Blob([data], { type: 'audio/midi' });
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement('a');
    a.href = url;
    a.download = `hum_${new Date().toISOString().slice(0,10)}.mid`;
    a.click();
    
    URL.revokeObjectURL(url);
}

function playNotes() {
    if (recordedNotes.length === 0) return;
    
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    let currentTime = ctx.currentTime + 0.1; // 稍微延迟开始
    
    // 遍历音符，和弦同时播放
    let i = 0;
    while (i < recordedNotes.length) {
        const note = recordedNotes[i];
        
        if (note.isChord) {
            // 收集和弦的所有音符
            const chordNotes = [];
            while (i < recordedNotes.length && recordedNotes[i].isChord) {
                chordNotes.push(recordedNotes[i]);
                i++;
            }
            
            // 同时播放和弦音符
            chordNotes.forEach(n => {
                playNoteAt(ctx, n.midiNote, currentTime, n.duration);
            });
            
            // 和弦时长取最长的音符
            const maxDuration = Math.max(...chordNotes.map(n => n.duration));
            currentTime += maxDuration;
        } else {
            // 播放单音
            playNoteAt(ctx, note.midiNote, currentTime, note.duration);
            currentTime += note.duration;
            i++;
        }
    }
}

// 在指定时间播放单个音符（使用钢琴音色）
function playNoteAt(ctx, midiNote, startTime, duration) {
    const freq = 440 * Math.pow(2, (midiNote - 69) / 12);
    
    // 等响度补偿
    const loudnessCompensation = Math.pow(2, (60 - midiNote) / 24);
    
    // 钢琴音色：加法合成
    const harmonics = [
        { ratio: 1.0,   gain: 1.0,   type: 'triangle' },
        { ratio: 2.0,   gain: 0.5,   type: 'sine' },
        { ratio: 3.0,   gain: 0.25,  type: 'sine' },
        { ratio: 4.0,   gain: 0.125, type: 'sine' },
        { ratio: 5.0,   gain: 0.0625, type: 'sine' },
    ];
    
    const masterGain = ctx.createGain();
    masterGain.connect(ctx.destination);
    masterGain.gain.setValueAtTime(0.3 * loudnessCompensation, startTime);
    masterGain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    
    harmonics.forEach(h => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.type = h.type;
        osc.frequency.value = freq * h.ratio;
        gain.gain.value = h.gain;
        
        osc.connect(gain);
        gain.connect(masterGain);
        
        osc.start(startTime);
        osc.stop(startTime + duration);
    });
}

// ========== 虚拟钢琴键盘 ==========
const PIANO_START_NOTE = 48; // C3
const PIANO_END_NOTE = 84;   // C6 (3个八度)
let pianoContext = null;
const activeOscillators = new Map(); // noteNumber -> {osc, gain, startTime}
const touchToNote = new Map(); // touchId -> noteNumber

function initPiano() {
    const piano = document.getElementById('piano');
    piano.innerHTML = '';
    
    // 如果已有 pianoContext 则复用，否则创建
    if (!pianoContext) {
        pianoContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    // 确保 AudioContext 处于运行状态
    if (pianoContext.state === 'suspended') {
        pianoContext.resume();
    }
    
    // 创建3个八度
    for (let octave = 0; octave < 3; octave++) {
        const octaveDiv = document.createElement('div');
        octaveDiv.className = 'piano-octave';
        
        const baseNote = PIANO_START_NOTE + octave * 12;
        
        // 7个白键: C, D, E, F, G, A, B
        const whiteNotes = [0, 2, 4, 5, 7, 9, 11];
        whiteNotes.forEach((offset, i) => {
            const key = document.createElement('div');
            key.className = 'white-key';
            key.dataset.note = baseNote + offset;
            
            // 添加音符标签
            const label = document.createElement('span');
            label.className = 'key-label';
            const noteNames = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            label.textContent = noteNames[i] + (3 + octave);
            key.appendChild(label);
            
            // 鼠标事件
            key.addEventListener('mousedown', (e) => {
                e.preventDefault();
                startPianoKey(baseNote + offset);
            });
            key.addEventListener('mouseup', () => stopPianoKey(baseNote + offset));
            key.addEventListener('mouseleave', () => {
                if (activeOscillators.has(baseNote + offset)) {
                    stopPianoKey(baseNote + offset);
                }
            });
            
            // 触摸事件（支持多点触控）
            key.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.changedTouches[0];
                touchToNote.set(touch.identifier, baseNote + offset);
                startPianoKey(baseNote + offset);
            }, {passive: false});
            key.addEventListener('touchend', (e) => {
                e.preventDefault();
                const touch = e.changedTouches[0];
                const note = touchToNote.get(touch.identifier);
                if (note !== undefined) {
                    stopPianoKey(note);
                    touchToNote.delete(touch.identifier);
                }
            }, {passive: false});
            
            octaveDiv.appendChild(key);
        });
        
        // 5个黑键: C#, D#, F#, G#, A#
        const blackNotes = [1, 3, 6, 8, 10];
        blackNotes.forEach(offset => {
            const key = document.createElement('div');
            key.className = 'black-key';
            key.dataset.note = baseNote + offset;
            
            // 鼠标事件
            key.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                startPianoKey(baseNote + offset);
            });
            key.addEventListener('mouseup', () => stopPianoKey(baseNote + offset));
            key.addEventListener('mouseleave', () => {
                if (activeOscillators.has(baseNote + offset)) {
                    stopPianoKey(baseNote + offset);
                }
            });
            
            // 触摸事件
            key.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const touch = e.changedTouches[0];
                touchToNote.set(touch.identifier, baseNote + offset);
                startPianoKey(baseNote + offset);
            }, {passive: false});
            key.addEventListener('touchend', (e) => {
                e.preventDefault();
                const touch = e.changedTouches[0];
                const note = touchToNote.get(touch.identifier);
                if (note !== undefined) {
                    stopPianoKey(note);
                    touchToNote.delete(touch.identifier);
                }
            }, {passive: false});
            
            octaveDiv.appendChild(key);
        });
        
        piano.appendChild(octaveDiv);
    }
}

function startPianoKey(noteNumber) {
    // 如果已经在发声，先停止
    if (activeOscillators.has(noteNumber)) {
        stopPianoKey(noteNumber);
    }
    
    const freq = 440 * Math.pow(2, (noteNumber - 69) / 12);
    
    // 等响度补偿：低频增益提升，高频增益降低
    // 基准：MIDI 60 (中央 C4)，每低一个八度增益翻倍，每高一个八度增益减半
    const loudnessCompensation = Math.pow(2, (60 - noteNumber) / 12);
    
    // 钢琴音色：加法合成（基频 + 泛音）
    // 参考：https://en.wikipedia.org/wiki/Piano_tuning
    const harmonics = [
        { ratio: 1.0,   gain: 1.0,   type: 'triangle' },  // 基频
        { ratio: 2.0,   gain: 0.5,   type: 'sine' },     // 2次谐波
        { ratio: 3.0,   gain: 0.25,  type: 'sine' },     // 3次谐波
        { ratio: 4.0,   gain: 0.125, type: 'sine' },     // 4次谐波
        { ratio: 5.0,   gain: 0.0625, type: 'sine' },    // 5次谐波
    ];
    
    const masterGain = pianoContext.createGain();
    masterGain.connect(pianoContext.destination);
    masterGain.gain.value = 0.3 * loudnessCompensation; // 应用等响度补偿
    
    const oscillators = [];
    
    // 创建每个谐波
    harmonics.forEach(h => {
        const osc = pianoContext.createOscillator();
        const gain = pianoContext.createGain();
        
        osc.type = h.type;
        osc.frequency.value = freq * h.ratio;
        gain.gain.value = h.gain;
        
        osc.connect(gain);
        gain.connect(masterGain);
        osc.start();
        
        oscillators.push({ osc, gain });
    });
    
    // 记录活跃的振荡器（使用 audioContext 时间或 performance.now）
    const startTime = (audioContext && isRecording) 
        ? audioContext.currentTime - recordStartTime 
        : performance.now() / 1000;
    
    activeOscillators.set(noteNumber, {
        oscillators: oscillators,
        masterGain: masterGain,
        startTime: startTime
    });
    
    // 如果正在录制，记录按下时间
    if (isRecording && pitchDetector) {
        const noteName = pitchDetector.midiToNote(noteNumber);
        keyboardNotesOn.set(noteNumber, {
            startTime: startTime,
            noteName: noteName
        });
        
        // 显示录制状态
        statusDot.classList.add('midi');
    }
    
    // 高亮按键
    highlightKey(noteNumber);
    
    // 更新显示
    if (pitchDetector) {
        currentNoteEl.textContent = pitchDetector.midiToNote(noteNumber);
    } else {
        currentNoteEl.textContent = `Note ${noteNumber}`;
    }
    currentFreqEl.textContent = `MIDI ${noteNumber} | 虚拟键盘`;
}

// 处理待处理的音符队列（分组和弦）
function processPendingNotes() {
    if (pendingNotes.length === 0) return;
    
    // 按 startTime 排序
    pendingNotes.sort((a, b) => a.startTime - b.startTime);
    
    // 分组和弦：startTime 相差 < 50ms 的音符为一组
    const groups = [];
    let currentGroup = [pendingNotes[0]];
    
    for (let i = 1; i < pendingNotes.length; i++) {
        const note = pendingNotes[i];
        const prevNote = currentGroup[0];
        
        // 如果 startTime 与组内第一个音符相差 < 50ms，加入当前组
        if (note.startTime - prevNote.startTime < 0.05) {
            currentGroup.push(note);
        } else {
            // 否则开始新组
            groups.push(currentGroup);
            currentGroup = [note];
        }
    }
    groups.push(currentGroup);
    
    // 标记并添加到 recordedNotes
    groups.forEach(group => {
        const isChord = group.length > 1;
        group.forEach(note => {
            note.isChord = isChord;
            recordedNotes.push(note);
        });
    });
    
    pendingNotes = [];
    displayNotes();
}

function stopPianoKey(noteNumber) {
    const active = activeOscillators.get(noteNumber);
    if (!active) return;
    
    // 渐出效果（避免爆音）
    const stopTime = pianoContext.currentTime + 0.15;
    active.masterGain.gain.exponentialRampToValueAtTime(0.001, stopTime);
    
    // 停止所有振荡器
    active.oscillators.forEach(({ osc }) => {
        osc.stop(stopTime);
    });
    
    activeOscillators.delete(noteNumber);
    
    // 取消高亮
    unhighlightKey(noteNumber);
    
    // 如果正在录制，加入待处理队列
    const keyNote = keyboardNotesOn.get(noteNumber);
    if (isRecording && pitchDetector && keyNote) {
        // 使用相同的时间基准
        const now = (audioContext && isRecording) 
            ? audioContext.currentTime - recordStartTime 
            : performance.now() / 1000;
        const duration = now - keyNote.startTime;
        
        const minDur = parseFloat(document.getElementById('minDuration').value);
        
        if (duration >= minDur) {
            pendingNotes.push({
                midiNote: noteNumber,
                noteName: keyNote.noteName,
                startTime: keyNote.startTime,
                duration: duration,
                fromKeyboard: true
            });
            
            keyboardNotesOn.delete(noteNumber);
            
            // 如果没有其他按键正在播放，立即处理队列
            if (activeOscillators.size === 0) {
                processPendingNotes();
            }
        }
    }
    
    // 更新显示
    if (activeOscillators.size === 0) {
        currentNoteEl.textContent = '--';
        currentFreqEl.textContent = '等待输入...';
        statusDot.classList.remove('midi');
    } else {
        // 显示最后一个按下的键
        const lastKey = Array.from(activeOscillators.keys()).pop();
        if (pitchDetector) {
            currentNoteEl.textContent = pitchDetector.midiToNote(lastKey);
        }
        currentFreqEl.textContent = `MIDI ${lastKey} | ${activeOscillators.size} 键同时按`;
    }
}

function highlightKey(noteNumber, duration = 0) {
    const key = document.querySelector(`[data-note="${noteNumber}"]`);
    if (key) {
        key.classList.add('active');
        if (duration > 0) {
            setTimeout(() => key.classList.remove('active'), duration);
        }
    }
}

function unhighlightKey(noteNumber) {
    const key = document.querySelector(`[data-note="${noteNumber}"]`);
    if (key) {
        key.classList.remove('active');
    }
}

// ========== 虚拟钢琴滚动控制 ==========
function initPianoScroll() {
    const scrollArea = document.getElementById('pianoScrollArea');
    const leftBtn = document.getElementById('pianoScrollLeft');
    const rightBtn = document.getElementById('pianoScrollRight');
    
    // 滚动步长（一个八度的宽度）
    const scrollStep = 252;
    
    leftBtn.onclick = () => {
        scrollArea.scrollBy({ left: -scrollStep, behavior: 'smooth' });
    };
    
    rightBtn.onclick = () => {
        scrollArea.scrollBy({ left: scrollStep, behavior: 'smooth' });
    };
    
    // 更新按钮状态
    function updateButtons() {
        leftBtn.disabled = scrollArea.scrollLeft <= 10;
        rightBtn.disabled = scrollArea.scrollLeft >= scrollArea.scrollWidth - scrollArea.clientWidth - 10;
    }
    
    scrollArea.addEventListener('scroll', updateButtons);
    
    // 初始化按钮状态
    setTimeout(updateButtons, 100);
    
    // 键盘快捷键（可选）
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        if (e.key === 'ArrowLeft') leftBtn.click();
        if (e.key === 'ArrowRight') rightBtn.click();
    });
}

// ========== 初始化 ==========
// 检查MIDI支持状态
if (navigator.requestMIDIAccess) {
    document.getElementById('midiStatus').textContent = '可用';
    document.getElementById('midiStatus').style.color = 'var(--success)';
} else {
    document.getElementById('midiStatus').textContent = '仅虚拟键盘';
    document.getElementById('midiStatus').style.color = 'var(--warning)';
}

// 检查系统内录支持
if (!navigator.mediaDevices || typeof navigator.mediaDevices.getDisplayMedia !== 'function') {
    document.getElementById('systemStatus').textContent = '不支持';
    document.getElementById('systemStatus').style.color = 'var(--text-dim)';
    document.getElementById('modeSystem').style.opacity = '0.5';
    document.getElementById('modeSystem').style.cursor = 'not-allowed';
}

// 初始化虚拟钢琴
initPiano();
initPianoScroll();
</script>
